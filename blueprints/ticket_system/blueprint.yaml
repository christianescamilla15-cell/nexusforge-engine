id: ticket_system
name: "Ticket Triage System"
description: >
  AI-powered ticket triage and routing system for customer support.
  Classifies incoming tickets by urgency and topic, assigns them to
  the right team, and provides suggested responses. Includes a
  dashboard for support managers to monitor queue health.

stack:
  framework: fastapi
  language: python
  state_management: redis
  database: postgresql
  queue: celery
  frontend: react

base_structure:
  - src/
  - src/api/
  - src/api/routes/
  - src/api/middleware/
  - src/core/
  - src/classifiers/
  - src/db/
  - src/db/models/
  - src/db/migrations/
  - src/services/
  - src/schemas/
  - src/tasks/
  - src/utils/
  - frontend/
  - frontend/src/
  - frontend/src/components/
  - frontend/src/pages/
  - frontend/src/hooks/
  - frontend/src/services/
  - frontend/public/
  - tests/
  - tests/unit/
  - tests/integration/
  - docs/
  - scripts/

required_modules:
  - auth
  - notifications
  - observability

optional_modules:
  - analytics
  - connectors
  - admin_panel

env_contract:
  - name: DATABASE_URL
    description: "PostgreSQL connection string"
    example: "postgresql://user:pass@localhost:5432/tickets"
    required: true
  - name: REDIS_URL
    description: "Redis connection string for caching and queues"
    example: "redis://localhost:6379/0"
    required: true
  - name: ANTHROPIC_API_KEY
    description: "Claude API key for ticket classification"
    example: "sk-ant-..."
    required: true
  - name: SECRET_KEY
    description: "Application secret for JWT signing"
    example: "change-me-in-production"
    required: true
  - name: SMTP_HOST
    description: "SMTP server for ticket notifications"
    example: "smtp.gmail.com"
    required: false
  - name: SMTP_PORT
    description: "SMTP port"
    example: "587"
    required: false
  - name: LOG_LEVEL
    description: "Logging level"
    example: "INFO"
    required: false

post_generation_hooks:
  - command: "pip install -r requirements.txt"
    description: "Install Python dependencies"
  - command: "cd frontend && npm install"
    description: "Install frontend dependencies"
  - command: "alembic upgrade head"
    description: "Run database migrations"
