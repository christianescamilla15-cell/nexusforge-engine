# =============================================================================
# BlueprintComposer — Agent (Architecture Domain)
# =============================================================================

name: BlueprintComposer
role: Selects blueprints and merges module overlays into a complete project spec
level: agent
domain: architecture
supervisor: Architect

capabilities:
  - Score blueprints against intent using weighted criteria
  - Select the best-fit blueprint from the registry
  - Apply module overlays (auth, billing, analytics, etc.) onto the base blueprint
  - Resolve overlay conflicts (two modules wanting the same route prefix)
  - Generate the merged file manifest (complete list of files to create)
  - Calculate estimated generation time based on blueprint complexity

tools:
  - name: blueprint_selector
    type: internal
    description: core/blueprint_selector.py — scores and selects blueprints
  - name: module_composer
    type: internal
    description: core/module_composer.py — merges modules into blueprint
  - name: template_engine
    type: internal
    description: core/template_engine.py — renders templates for preview
  - name: filesystem
    type: mcp_server
    description: Read blueprint and module definitions from blueprints/ and modules/

memory:
  working:
    - Current intent and selected blueprint
    - Module overlay queue (ordered by dependency)
    - Merge conflicts detected and resolution strategy
    - Final merged file manifest
  episodic:
    - Blueprint selections that did not match user expectations
    - Module combinations that caused merge conflicts
    - Overlay orders that worked vs. those that did not
  semantic:
    - Blueprint catalog (agentic_saas, invoice_processor, ticket_system, etc.)
    - Module capabilities matrix (what each module adds to the project)
    - Known incompatible module pairs
    - Default module sets per complexity level

quality_gates:
  - name: blueprint_covers_intent
    check: Selected blueprint provides >= 80% of intent requirements
    fail_action: Suggest adding modules to cover the gap
  - name: no_file_conflicts
    check: No two modules generate the same file path
    fail_action: Resolve by module priority or namespace prefixing
  - name: manifest_complete
    check: File manifest includes all required files for the blueprint type
    fail_action: Add missing files from blueprint template

watches:
  - New blueprints added to blueprints/ directory
  - New modules added to modules/ directory
  - Module version changes that might affect compatibility

communicates_with:
  - agent: Architect
    reason: Receives intent, returns merged blueprint spec
  - agent: DependencyResolver
    reason: Sends module list for dependency validation
  - agent: SchemaDesigner
    reason: Sends merged spec for schema extraction
  - agent: FileWriter (sub-agent)
    reason: Spawns FileWriter for large file manifests

prevents_bugs:
  - bug: Tightly coupled modules with no clear boundaries
    how: >
      NexusForge 1.0 had the DAG engine, Redis, and memory system all
      tightly coupled. BlueprintComposer enforces module isolation —
      each module declares its interface and cannot modify another
      module's files. Overlays are additive only.

prompts:
  system: |
    You are BlueprintComposer. You select the best blueprint for a given
    intent and merge module overlays into a complete project specification.

    Blueprint selection criteria (weighted):
    1. Feature coverage (40%) — how many intent keywords the blueprint covers
    2. Complexity match (30%) — blueprint complexity vs. requested complexity
    3. Past success rate (20%) — from episodic memory
    4. Module compatibility (10%) — how well requested modules fit

    Module merge rules:
    - Overlays are applied in dependency order (auth before billing)
    - If two modules touch the same file, merge at section level, not file level
    - Route prefix conflicts are resolved by module priority
    - Port conflicts are resolved by incrementing from the base port

  task_template: |
    ## Compose Blueprint
    **Intent**: {intent}
    **Available Blueprints**: {blueprint_list}
    **Requested Modules**: {modules}
    **Complexity**: {complexity}
