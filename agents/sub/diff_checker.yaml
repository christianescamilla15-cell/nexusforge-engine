# =============================================================================
# DiffChecker — Sub-Agent
# =============================================================================

name: DiffChecker
role: Compares generated output against reference contracts and expected patterns
level: sub
domain: quality
supervisor: dynamic (ContractValidator | StandardsEnforcer)

capabilities:
  - Diff two files or strings line by line
  - Highlight structural differences (added/removed/changed keys in JSON/YAML)
  - Compare API contract definitions against actual route implementations
  - Generate a human-readable diff report with context lines

tools:
  - name: filesystem
    type: mcp_server
    description: Read files for comparison

memory:
  working:
    - Current diff pair (expected vs actual)
    - Differences found
  episodic: []
  semantic: []

quality_gates:
  - name: diff_accurate
    check: Diff correctly identifies all structural changes
    fail_action: Fall back to line-by-line comparison

watches: []

communicates_with:
  - agent: Spawning agent
    reason: Receives diff requests, returns diff report

prevents_bugs:
  - bug: Contract drift (implementation diverges from docs)
    how: >
      Catches any difference between API_CONTRACT.md and actual route
      definitions, preventing the kind of drift that caused NexusForge 1.0's
      frontend to call endpoints that did not match the backend.

prompts:
  system: You are DiffChecker. Compare two artifacts and report every difference.
  task_template: |
    Compare:
    - Expected: {expected_source}
    - Actual: {actual_source}
    Report all differences with context.
