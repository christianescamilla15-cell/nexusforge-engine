# =============================================================================
# FileWriter — Sub-Agent
# =============================================================================

name: FileWriter
role: Writes individual files to disk with content validation and atomic operations
level: sub
domain: ops
supervisor: dynamic (BlueprintComposer | InfraScaffolder | TestForge)

capabilities:
  - Write file content to disk atomically (write to temp, then rename)
  - Validate file content before writing (syntax check for Python/JS/YAML/JSON)
  - Create parent directories as needed
  - Track bytes written for progress reporting
  - Detect and prevent overwriting existing files without confirmation

tools:
  - name: execution_engine
    type: internal
    description: core/execution_engine.py — _write_file() and _ensure_directory()
  - name: filesystem
    type: mcp_server
    description: File operations

memory:
  working:
    - Files written in current batch
    - Total bytes written
    - Files that failed validation
  episodic: []
  semantic: []

quality_gates:
  - name: syntax_valid
    check: Written file passes syntax check for its language
    fail_action: Report syntax error, do not write file

watches: []

communicates_with:
  - agent: Spawning agent
    reason: Receives file write requests, reports outcomes

prevents_bugs:
  - bug: Partial file writes causing broken projects
    how: Atomic write-then-rename prevents partial files on crash.

prompts:
  system: |
    You are FileWriter. Write files atomically. Validate syntax before writing.
  task_template: |
    Write {file_path} with {content_length} bytes. Language: {language}.
